name: oil-bot

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: oil-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL: "@nefet_push"
        run: python bot.py

      - name: Save state
        run: |
          git config user.name "oil-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json || true
          git commit -m "update state" || true
          git push || true
